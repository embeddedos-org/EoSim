# ============================================================================
# EoSim — Kubernetes Production Deployment
# ============================================================================
# Apply with: kubectl apply -f enterprise/k8s/
# Namespace:  eosim
# ============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: eosim
  labels:
    app.kubernetes.io/name: eosim
    app.kubernetes.io/version: "3.0.1"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eosim
  namespace: eosim
  labels:
    app.kubernetes.io/name: eosim
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: eosim-config
  namespace: eosim
data:
  EOSIM_ENV: "production"
  EOSIM_HOST: "0.0.0.0"
  EOSIM_PORT: "8080"
  EOSIM_WORKERS: "4"
  EOSIM_LOG_LEVEL: "INFO"
  EOSIM_API_URL: "https://api.eosim.io"
  EOSIM_WS_URL: "wss://api.eosim.io"
  EOSIM_DOCS_URL: "https://docs.eosim.io"
  EOSIM_STATUS_URL: "https://status.eosim.io"
  EOSIM_CDN_URL: "https://cdn.eosim.io"
  EOSIM_LANG: "en"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eosim-api
  namespace: eosim
  labels:
    app.kubernetes.io/name: eosim
    app.kubernetes.io/component: api
    app.kubernetes.io/version: "3.0.1"
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: eosim
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eosim
        app.kubernetes.io/component: api
        app.kubernetes.io/version: "3.0.1"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/api/v1/metrics"
    spec:
      serviceAccountName: eosim
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values: ["eosim"]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: eosim-api
          image: ghcr.io/embeddedos-org/eosim:3.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: eosim-config
            - secretRef:
                name: eosim-secrets
                optional: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /opt/eosim/data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: eosim-data
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: eosim-api
  namespace: eosim
  labels:
    app.kubernetes.io/name: eosim
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: eosim
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eosim-api
  namespace: eosim
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.eosim.io,https://eosim.io"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.eosim.io
      secretName: eosim-tls
  rules:
    - host: api.eosim.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: eosim-api
                port:
                  number: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: eosim-api
  namespace: eosim
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: eosim-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: eosim-data
  namespace: eosim
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
