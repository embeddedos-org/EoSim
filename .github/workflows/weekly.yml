name: Weekly

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: weekly-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ─── Full Matrix Test ──────────────────────────────────────────────
  full-test:
    name: Tests (${{ matrix.os }}, Py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --junitxml=results.xml
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-${{ matrix.os }}-py${{ matrix.python-version }}
          path: results.xml

  # ─── Deep Coverage Analysis ────────────────────────────────────────
  coverage:
    name: Deep Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Coverage
        run: |
          python -m pytest tests/ \
            --cov=eosim \
            --cov-branch \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term \
            -v --tb=short
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: weekly-coverage
          path: |
            coverage.xml
            htmlcov/

  # ─── Dependency Audit ──────────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e "." pip-audit
      - name: Audit
        run: pip-audit --strict 2>&1 || true

  # ─── Documentation Freshness ───────────────────────────────────────
  docs-check:
    name: Docs Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check doc files exist
        run: |
          required_docs=(
            "docs/getting-started.md"
            "docs/architecture.md"
            "docs/simulator-guide.md"
            "docs/peripheral-guide.md"
            "docs/domain-guide.md"
            "docs/analysis-guide.md"
            "docs/rest-api-guide.md"
            "docs/plugin-development.md"
            "docs/production-deployment.md"
            "docs/Doxyfile"
          )
          missing=0
          for doc in "${required_docs[@]}"; do
            if [ ! -f "$doc" ]; then
              echo "MISSING: $doc"
              missing=$((missing + 1))
            fi
          done
          echo "$((${#required_docs[@]} - missing))/${#required_docs[@]} docs present"
          [ $missing -eq 0 ] || exit 1

  # ─── Weekly Report ─────────────────────────────────────────────────
  report:
    name: Weekly Report
    runs-on: ubuntu-latest
    needs: [full-test, coverage, audit, docs-check]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e "." 2>/dev/null || true
      - name: Report
        run: |
          echo "## Weekly Report — EoSim v2.0.0" >> $GITHUB_STEP_SUMMARY
          echo "**Week of:** $(date -u '+%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Full Matrix (4 Python x 3 OS) | ${{ needs.full-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Audit | ${{ needs.audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ${{ needs.docs-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          python -c "
          import os
          from eosim.core.schema import VALID_ARCHES, VALID_DOMAINS, VALID_ENGINES, VALID_MODELING, VALID_CLASSES
          from eosim.engine.native.simulators import SIMULATOR_MAP, SimulatorFactory
          from eosim.gui.product_templates import PRODUCT_CATALOG
          from eosim.core.domains import DOMAIN_CATALOG

          p = len([d for d in os.listdir('platforms') if os.path.isdir(os.path.join('platforms', d))])
          print('### Platform & Simulator Metrics')
          print('| Metric | Count |')
          print('|--------|-------|')
          print(f'| Platforms | **{p}** |')
          print(f'| Architectures | **{len(VALID_ARCHES)}** |')
          print(f'| Domains | **{len(VALID_DOMAINS)}** |')
          print(f'| Domain Profiles | **{len(DOMAIN_CATALOG)}** |')
          print(f'| Engines | **{len(VALID_ENGINES)}** |')
          print(f'| Modeling Methods | **{len(VALID_MODELING)}** |')
          print(f'| Platform Classes | **{len(VALID_CLASSES)}** |')
          print(f'| Simulator Types | **{len(SimulatorFactory.list_simulators())}** |')
          print(f'| Simulator Map Entries | **{len(SIMULATOR_MAP)}** |')
          print(f'| Product Templates | **{len(PRODUCT_CATALOG)}** |')
          " >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
