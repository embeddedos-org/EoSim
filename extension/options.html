<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EoSim Extension Settings</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0e1a;color:#e2e8f0;max-width:600px;margin:40px auto;padding:0 20px}
  h1{color:#60a5fa;font-size:22px;margin-bottom:4px}
  .subtitle{color:#94a3b8;font-size:13px;margin-bottom:32px}
  .section{background:#111827;border:1px solid #1e293b;border-radius:12px;padding:20px;margin-bottom:16px}
  .section h2{font-size:14px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:16px}
  label{display:block;font-size:13px;color:#e2e8f0;margin-bottom:6px}
  input,select{width:100%;padding:8px 12px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:13px;margin-bottom:12px;font-family:inherit}
  input:focus,select:focus{outline:none;border-color:#60a5fa}
  .btn{padding:10px 20px;background:#1d4ed8;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
  .btn:hover{background:#2563eb}
  .saved{color:#34d399;font-size:12px;margin-left:10px;display:none}
</style>
</head>
<body>
<h1>EoSim Extension Settings</h1>
<p class="subtitle">Configure your EoSim browser extension preferences</p>

<div class="section">
  <h2>API Configuration</h2>
  <label>API Base URL</label>
  <input type="url" id="apiBase" value="https://api.eosim.io" placeholder="https://api.eosim.io">
  <label>API Key (optional)</label>
  <input type="password" id="apiKey" placeholder="Your EoSim API key">
</div>

<div class="section">
  <h2>Language</h2>
  <label>Interface Language</label>
  <select id="lang">
    <option value="en">English</option>
    <option value="es">Español</option>
    <option value="zh">中文 (Mandarin)</option>
    <option value="hi">हिन्दी (Hindi)</option>
    <option value="fr">Français</option>
    <option value="ar">العربية (Arabic)</option>
    <option value="pt">Português</option>
    <option value="de">Deutsch</option>
    <option value="ja">日本語</option>
    <option value="ko">한국어</option>
  </select>
</div>

<div class="section">
  <h2>Notifications</h2>
  <label><input type="checkbox" id="notifs" style="width:auto;margin-right:8px"> Enable simulation status notifications</label>
</div>

<button class="btn" onclick="save()">Save Settings</button>
<span class="saved" id="savedMsg">✓ Saved!</span>

<script>
  chrome.storage.local.get(['apiBase','apiKey','lang','notifications'], (data) => {
    if (data.apiBase) document.getElementById('apiBase').value = data.apiBase;
    if (data.apiKey) document.getElementById('apiKey').value = data.apiKey;
    if (data.lang) document.getElementById('lang').value = data.lang;
    document.getElementById('notifs').checked = data.notifications !== false;
  });

  function save() {
    chrome.storage.local.set({
      apiBase: document.getElementById('apiBase').value,
      apiKey: document.getElementById('apiKey').value,
      lang: document.getElementById('lang').value,
      notifications: document.getElementById('notifs').checked,
    }, () => {
      const msg = document.getElementById('savedMsg');
      msg.style.display = 'inline';
      setTimeout(() => msg.style.display = 'none', 2000);
    });
  }
</script>
</body>
</html>
